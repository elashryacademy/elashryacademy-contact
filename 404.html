<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الصفحة غير موجودة | El Ashry Academy</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      color: #fff;
      background: radial-gradient(circle at 20% 20%, rgba(0,37,95,0.6) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(255,186,0,0.25) 0%, transparent 50%),
                  #0a0f1f;
    }
    .box { max-width: 500px; }
    .code {
      font-size: 7rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFD54F, #FFBA00, #F09000);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: rgba(255,255,255,0.7); margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #FFD54F, #FFBA00);
      color: #00255F;
      font-weight: 700;
      border-radius: 999px;
      text-decoration: none;
      transition: transform 0.3s;
    }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>الصفحة غير موجودة</h1>
    <p>عذرًا، الصفحة اللي بتدور عليها مش موجودة أو تم نقلها.</p>
    <a href="/" class="btn">العودة للرئيسية</a>
  </div>
  <script>
    // Redirect to root after 5 seconds
    setTimeout(() => { window.location.href = "/"; }, 5000);
  </script>
</body>
</html>
