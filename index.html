<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#002662" />

  <!-- ===================== SEO ===================== -->
  <title id="seoTitle">El Ashry Academy | الصفحة الرسمية للتواصل</title>
  <meta id="seoDesc" name="description" content="El Ashry Academy — أكاديمية العشري. الصفحة الرسمية للتواصل." />
  <meta id="seoKeywords" name="keywords" content="El Ashry Academy, أكاديمية العشري, تواصل" />
  <meta name="author" content="El Ashry Academy" />
  <meta name="robots" content="index, follow" />
  <link id="canonicalLink" rel="canonical" href="https://elashry-academy.github.io/" />

  <!-- ===================== Open Graph ===================== -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="El Ashry Academy" />
  <meta id="ogTitle" property="og:title" content="El Ashry Academy" />
  <meta id="ogDesc" property="og:description" content="الصفحة الرسمية للتواصل" />
  <meta property="og:image" content="assets/images/og-image.png" />
  <meta id="ogUrl" property="og:url" content="https://elashry-academy.github.io/" />
  <meta property="og:locale" content="ar_AR" />

  <!-- ===================== Twitter Card ===================== -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta id="twTitle" name="twitter:title" content="El Ashry Academy" />
  <meta id="twDesc" name="twitter:description" content="الصفحة الرسمية للتواصل" />
  <meta name="twitter:image" content="assets/images/og-image.png" />

  <!-- ===================== Icons ===================== -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/android-chrome-192.png" />
  <link rel="icon" type="image/ico" href="assets/images/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="El Ashry" />

  <!-- ===================== Fonts ===================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- ===================== Styles ===================== -->
  <link rel="stylesheet" href="assets/css/themes.css" />
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- ===================== Structured Data ===================== -->
  <script type="application/ld+json" id="schemaData">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "El Ashry Academy",
    "alternateName": "أكاديمية العشري",
    "url": "https://elashry-academy.github.io/",
    "logo": "assets/images/Logo.png",
    "image": "assets/images/og-image.png",
    "description": "الصفحة الرسمية للتواصل — كل روابطنا في مكان واحد."
  }
  </script>

  <!-- ===================== Preload ===================== -->
  <link rel="preload" as="image" href="assets/images/Logo.png" />
</head>
<body>

  <!-- ============== Loading Screen ============== -->
  <div id="loader" class="loader" aria-hidden="true">
    <div class="loader__logo">
      <img src="assets/images/Logo.png" alt="" width="96" height="96" />
    </div>
    <div class="loader__bar"><span></span></div>
  </div>

  <!-- ============== Background ============== -->
  <div class="bg" aria-hidden="true">
    <div class="bg__gradient"></div>
    <div class="bg__grain"></div>
    <canvas id="particles" class="bg__particles"></canvas>
    <div class="bg__glow bg__glow--1"></div>
    <div class="bg__glow bg__glow--2"></div>
  </div>

  <!-- ============== Skip link ============== -->
  <a href="#main" class="skip">تخطَّ إلى المحتوى</a>

  <!-- ============== Main ============== -->
  <main id="main" class="page">

    <!-- ====== HERO ====== -->
    <header class="hero" role="banner">
      <div class="hero__logo-wrap">
        <div class="hero__logo-ring" aria-hidden="true"></div>
        <img id="heroLogo" class="hero__logo" src="assets/images/Logo.png"
             alt="El Ashry Academy" width="120" height="120" decoding="async" />
      </div>

      <h1 class="hero__name" id="heroName">El Ashry Academy</h1>
      <p class="hero__tagline" id="heroTagline">نتعلّم صح... ونشتغل صح.</p>
    </header>

    <!-- ====== CONTACT CARDS ====== -->
    <section class="cards" id="cardsContainer" aria-label="روابط التواصل">
      <!-- Cards rendered by JS -->
    </section>

    <!-- ====== FOOTER ====== -->
    <footer class="footer" role="contentinfo">
      <p class="footer__text" id="footerText">© 2026 El Ashry Academy</p>
      <p class="footer__credit" id="footerCredit">Made with ❤️ in Egypt</p>
    </footer>
  </main>

  <!-- ============== Floating Action Buttons ============== -->
  <div class="fab-stack" aria-label="أزرار سريعة">
    <button class="fab" id="qrBtn" type="button" aria-label="عرض رمز QR" title="QR Code">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm8-2h2v2h-2v-2zm2 2h2v2h-2v-2zm-2 2h2v2h-2v-2zm0 2h2v2h-2v-2zm2 0h2v2h-2v-2zm0 2h2v2h-2v-2z"/></svg>
    </button>
    <button class="fab" id="shareBtn" type="button" aria-label="مشاركة الصفحة" title="مشاركة">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81a3 3 0 1 0-3-3c0 .24.04.47.09.7L8.04 9.81A3 3 0 1 0 6 15a3 3 0 0 0 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65a2.92 2.92 0 1 0 2.92-2.92z"/></svg>
    </button>
    <button class="fab fab--top" id="topBtn" type="button" aria-label="العودة للأعلى" title="الأعلى">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M12 7l5 5h-3v6h-4v-6H7l5-5z"/></svg>
    </button>
  </div>

  <!-- ============== QR Modal ============== -->
  <div class="modal" id="qrModal" aria-hidden="true" role="dialog" aria-labelledby="qrModalTitle">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel glass">
      <button class="modal__close" data-close aria-label="إغلاق">&times;</button>
      <h3 class="modal__title" id="qrModalTitle">امسح للوصول السريع</h3>
      <div class="modal__body">
        <div id="qrCode" class="qr"></div>
        <p class="modal__hint">وجّه كاميرا هاتفك إلى الرمز</p>
      </div>
    </div>
  </div>

  <!-- ============== Toast ============== -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ============== Scripts ============== -->
  <script src="assets/js/config.js" defer></script>
  <script src="assets/js/config-manager.js" defer></script>
  <script src="assets/js/theme.js" defer></script>
  <script src="assets/js/qr.js" defer></script>
  <script src="assets/js/cards.js" defer></script>
  <script src="assets/js/particles.js" defer></script>
  <script src="assets/js/main.js" defer></script>
</body>
</html>
