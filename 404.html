<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | El Ashry Academy</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#002662" />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800&family=Inter:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', 'Inter', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
      color: #F5F7FA;
      background:
        radial-gradient(ellipse 60% 50% at 20% 0%, rgba(0,38,98,0.6), transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 100%, rgba(255,191,0,0.18), transparent 60%),
        #070B16;
    }
    .box { max-width: 460px; }
    .code {
      font-size: 8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFD54F, #FFBF00, #E09600);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.01em; }
    p { color: rgba(245,247,250,0.6); margin-bottom: 2rem; font-size: 0.95rem; }
    .btn {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      background: linear-gradient(135deg, #FFBF00, #E09600);
      color: #002662;
      font-weight: 700;
      border-radius: 999px;
      text-decoration: none;
      transition: transform 0.3s, box-shadow 0.3s;
      font-size: 0.95rem;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(255,191,0,0.4);
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>الصفحة غير موجودة</h1>
    <p>عذرًا، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
    <a href="/" class="btn">العودة للرئيسية</a>
  </div>
  <script>
    setTimeout(() => { window.location.href = "/"; }, 5000);
  </script>
</body>
</html>
