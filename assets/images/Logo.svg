<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F3782"/>
      <stop offset="100%" stop-color="#002662"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="55%" stop-color="#FFBF00"/>
      <stop offset="100%" stop-color="#E09600"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFBF00" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFBF00" stop-opacity="0"/>
    </radialGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="256" cy="256" r="250" fill="url(#navy)"/>

  <!-- Soft glow behind A -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Thin gold ring -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.85"/>

  <!-- Letter A monogram -->
  <g filter="url(#ds)">
    <path d="M 256 130
             L 372 388
             L 332 388
             L 305 322
             L 207 322
             L 180 388
             L 140 388
             Z
             M 222 286
             L 290 286
             L 256 200
             Z"
          fill="url(#gold)"/>
  </g>

  <!-- Academy label arc -->
  <text x="256" y="450" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="700" fill="#FFBF00"
        letter-spacing="6">EL ASHRY</text>
</svg>