<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ================== SEO META ================== -->
  <title>El Ashry Academy | أكاديمية العشري</title>
  <meta name="description" content="El Ashry Academy - أكاديمية العشري ل.Apis الهندسي والتقني الاحترافي. اتعلّم صح... وطبّق بإيدك... واحتَرِف. باشمهندس عبده العشري." />
  <meta name="keywords" content="El Ashry Academy, أكاديمية العشري, عبده العشري, تعليم هندسي, كورسات هندسية, Abdo El Ashry, engineering academy, التعليم الهندسي" />
  <meta name="author" content="Eng. Abdo El Ashry" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://elashry-academy.github.io/" />

  <!-- ================== Open Graph ================== -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="El Ashry Academy | أكاديمية العشري" />
  <meta property="og:description" content="اتعلّم صح... وطبّق بإيدك... واحتَرِف. منصة تعليمية هندسية احترافية بقيادة باشمهندس عبده العشري." />
  <meta property="og:image" content="assets/images/og-image.png" />
  <meta property="og:url" content="https://elashry-academy.github.io/" />
  <meta property="og:site_name" content="El Ashry Academy" />
  <meta property="og:locale" content="ar_AR" />
  <meta property="og:locale:alternate" content="en_US" />

  <!-- ================== Twitter Card ================== -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="El Ashry Academy | أكاديمية العشري" />
  <meta name="twitter:description" content="اتعلّم صح... وطبّق بإيدك... واحتَرِف." />
  <meta name="twitter:image" content="assets/images/og-image.png" />

  <!-- ================== Favicons ================== -->
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/android-chrome-192.png" />
  <link rel="icon" type="image/ico" href="assets/images/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#00255F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="El Ashry Academy" />

  <!-- ================== Fonts ================== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- ================== Styles ================== -->
  <link rel="stylesheet" href="assets/css/themes.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/animations.css" />

  <!-- ================== Schema.org ================== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "EducationalOrganization",
    "name": "El Ashry Academy",
    "alternateName": "أكاديمية العشري",
    "description": "منصة تعليمية هندسية متخصصة في تقديم المحتوى التقني الاحترافي.",
    "founder": {
      "@type": "Person",
      "name": "Eng. Abdo El Ashry",
      "alternateName": "باشمهندس عبده العشري"
    },
    "slogan": "اتعلّم صح... وطبّق بإيدك... واحتَرِف",
    "logo": "assets/images/Logo.png",
    "image": "assets/images/og-image.png",
    "url": "https://elashry-academy.github.io/",
    "sameAs": []
  }
  </script>

  <!-- ================== Preload ================== -->
  <link rel="preload" as="image" href="assets/images/Logo.png" />
</head>
<body>

  <!-- ================== Loading Screen ================== -->
  <div id="loader" class="loader" aria-hidden="true">
    <div class="loader__logo">
      <img src="assets/images/Logo.png" alt="El Ashry Academy" width="120" height="120" />
    </div>
    <div class="loader__ring"></div>
    <p class="loader__text">El Ashry Academy</p>
  </div>

  <!-- ================== Animated Background ================== -->
  <div class="bg-gradient" aria-hidden="true"></div>
  <canvas id="particles" class="particles" aria-hidden="true"></canvas>
  <div class="bg-grid" aria-hidden="true"></div>

  <!-- ================== Skip Link (Accessibility) ================== -->
  <a href="#main" class="skip-link">تخطَّ إلى المحتوى</a>

  <!-- ================== Main ================== -->
  <main id="main" class="container">

    <!-- =============== HERO SECTION =============== -->
    <header class="hero" role="banner">
      <div class="hero__logo-wrap">
        <div class="hero__logo-glow"></div>
        <img id="heroLogo" class="hero__logo" src="assets/images/Logo.png"
             alt="El Ashry Academy logo" width="180" height="180" loading="eager" decoding="async" />
      </div>

      <h1 class="hero__name" id="academyName">El Ashry Academy</h1>
      <p class="hero__name-ar" id="academyNameAr" lang="ar">أكاديمية العشري</p>

      <div class="hero__slogan" id="slogan">اتعلّم صح... وطبّق بإيدك... واحتَرِف</div>

      <p class="hero__bio" id="bio"></p>

      <div class="hero__owner">
        <span class="hero__owner-line"></span>
        <span id="ownerName">باشمهندس عبده العشري</span>
        <span class="hero__owner-line"></span>
      </div>

      <div class="hero__cta">
        <button class="btn btn--primary ripple" id="quickContactBtn" type="button">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path fill="currentColor" d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/>
          </svg>
          <span>تواصل سريع</span>
        </button>
        <button class="btn btn--ghost ripple" id="shareBtn" type="button" aria-label="مشاركة الصفحة">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path fill="currentColor" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81a3 3 0 1 0-3-3c0 .24.04.47.09.7L8.04 9.81A3 3 0 1 0 6 15a3 3 0 0 0 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65a2.92 2.92 0 1 0 2.92-2.92z"/>
          </svg>
          <span>مشاركة</span>
        </button>
      </div>
    </header>

    <!-- =============== CONTACT CARDS =============== -->
    <section class="cards" id="cardsContainer" aria-label="روابط التواصل">
      <!-- Cards rendered by JS -->
    </section>

    <!-- =============== FOOTER =============== -->
    <footer class="footer" role="contentinfo">
      <div class="footer__logo">
        <img src="assets/images/Logo-white.png" alt="El Ashry Academy" width="60" height="60" loading="lazy" />
      </div>
      <p class="footer__copy">
        © <span id="year"></span>
        <strong>El Ashry Academy</strong> — جميع الحقوق محفوظة.
      </p>
      <p class="footer__slogan" id="footerSlogan"></p>
      <a href="admin/" class="footer__admin" aria-label="لوحة الإدارة">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4 0-9 2-9 5v3h18v-3c0-3-5-5-9-5z"/></svg>
        <span>لوحة الإدارة</span>
      </a>
    </footer>
  </main>

  <!-- ================== Floating Action Buttons ================== -->
  <div class="fab-stack" aria-label="أزرار سريعة">
    <button class="fab fab--theme ripple" id="themeToggle" type="button" aria-label="تبديل الوضع الليلي/النهاري" title="تبديل المظهر">
      <svg class="icon-moon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M12 17a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0-14a1 1 0 0 0-1 1v2a1 1 0 0 0 2 0V4a1 1 0 0 0-1-1zm0 16a1 1 0 0 0-1 1v2a1 1 0 0 0 2 0v-2a1 1 0 0 0-1-1zM4 13H2a1 1 0 0 0 0 2h2a1 1 0 0 0 0-2zm18 0h-2a1 1 0 0 0 0 2h2a1 1 0 0 0 0-2zM5.64 6.05L4.22 4.64a1 1 0 0 0-1.41 1.41l1.41 1.41a1 1 0 0 0 1.41-1.41zm14.14 12.73a1 1 0 0 0-1.41 0 1 1 0 0 0 0 1.41l1.41 1.41a1 1 0 0 0 1.41-1.41zM18.36 6.05a1 1 0 0 0 1.41 0l1.41-1.41a1 1 0 0 0-1.41-1.41l-1.41 1.41a1 1 0 0 0 0 1.41zM4.22 19.78a1 1 0 0 0 1.41 0l1.41-1.41a1 1 0 0 0-1.41-1.41L4.22 18.36a1 1 0 0 0 0 1.42z"/></svg>
    </button>
    <button class="fab fab--qr ripple" id="qrBtn" type="button" aria-label="عرض رمز QR" title="QR Code">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm8-2h2v2h-2v-2zm2 2h2v2h-2v-2zm-2 2h2v2h-2v-2zm4-4h2v2h-2v-2zm0 2h2v2h-2v-2zm-2 2h2v2h-2v-2zm0 2h2v2h-2v-2zm2 0h2v2h-2v-2zm0 2h2v2h-2v-2z"/></svg>
    </button>
    <button class="fab fab--vcf ripple" id="vcfBtn" type="button" aria-label="تحميل بطاقة التواصل VCF" title="تحميل VCF">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 14l-5-5h3V8h4v4h3l-5 5z"/></svg>
    </button>
    <button class="fab fab--top ripple" id="topBtn" type="button" aria-label="العودة للأعلى" title="العودة للأعلى">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M12 7l5 5h-3v6h-4v-6H7l5-5z"/></svg>
    </button>
  </div>

  <!-- ================== QR Modal ================== -->
  <div class="modal" id="qrModal" aria-hidden="true" role="dialog" aria-labelledby="qrModalTitle">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel glass">
      <button class="modal__close" data-close aria-label="إغلاق">&times;</button>
      <h3 class="modal__title" id="qrModalTitle">رمز QR للصفحة</h3>
      <div class="modal__body">
        <div id="qrCode" class="qr-code"></div>
        <p class="modal__hint">امسح الرمز لمشاركة صفحة الأكاديمية</p>
      </div>
    </div>
  </div>

  <!-- ================== Quick Contact Modal ================== -->
  <div class="modal" id="contactModal" aria-hidden="true" role="dialog" aria-labelledby="contactModalTitle">
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel glass">
      <button class="modal__close" data-close aria-label="إغلاق">&times;</button>
      <h3 class="modal__title" id="contactModalTitle">تواصل سريع</h3>
      <div class="modal__body">
        <div class="contact-quick" id="contactQuick">
          <!-- Filled by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- ================== Toast ================== -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- ================== Scripts ================== -->
  <script src="assets/js/config.js" defer></script>
  <script src="assets/js/theme.js" defer></script>
  <script src="assets/js/particles.js" defer></script>
  <script src="assets/js/qr.js" defer></script>
  <script src="assets/js/cards.js" defer></script>
  <script src="assets/js/main.js" defer></script>
</body>
</html>
