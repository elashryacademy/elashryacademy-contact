<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00255F"/>
      <stop offset="100%" stop-color="#001A47"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FFBA00"/>
      <stop offset="100%" stop-color="#F09000"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFBA00"/>
      <stop offset="100%" stop-color="#F09000"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.3"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#navyGrad)"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ringGrad)" stroke-width="6" opacity="0.85"/>
  <g filter="url(#shadow)">
    <path d="M 256 130 L 360 380 L 318 380 L 295 320 L 217 320 L 194 380 L 152 380 Z M 232 285 L 280 285 L 256 215 Z"
          fill="url(#goldGrad)"/>
    <circle cx="256" cy="170" r="10" fill="#FFFFFF" opacity="0.95"/>
  </g>
  <path d="M 130 410 Q 256 440 382 410" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.6"/>
  <text x="256" y="448" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700"
        fill="#FFBA00" letter-spacing="2">EL ASHRY</text>
</svg>